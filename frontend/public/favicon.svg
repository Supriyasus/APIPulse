<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0A0F0D" />
  <!-- Border -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="none" stroke="url(#brand-grad)" stroke-width="20" opacity="0.8" />
  <!-- Pulse Wave (Amber Gold) -->
  <path d="M 100 256 H 180 L 220 120 L 280 392 L 320 210 L 350 285 L 375 256 H 412" 
        fill="none" 
        stroke="#F59E0B" 
        stroke-width="32" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#glow)" />
</svg>